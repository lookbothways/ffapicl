<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cypher Interface</title>
    
    <!-- Load Roboto Font (Thin weight) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fff;
            color: #000;
            font-family: 'Roboto', sans-serif;
            font-weight: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Keyword Row */
        .input-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        label {
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        input[type="text"], textarea {
            width: 100%;
            border: 1px solid #000;
            border-radius: 20px;
            padding: 12px 20px;
            font-family: 'Roboto', sans-serif;
            font-weight: 100;
            font-size: 1rem;
            background: transparent;
            outline: none;
            color: #000;
        }

        textarea {
            height: 200px;
            resize: none;
            border-radius: 20px;
            line-height: 1.5;
        }

        /* Buttons Row */
        .button-row {
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
        }

        button {
            background: none;
            border: none;
            font-family: 'Roboto', sans-serif;
            font-weight: 100;
            font-size: 1.3rem;
            cursor: pointer;
            letter-spacing: 2px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.5;
        }

        button:active {
            font-weight: 400; /* Slight visual feedback */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Keyword Input -->
        <div class="input-row">
            <label for="keyword">keyword</label>
            <input type="text" id="keyword" placeholder="..." autocomplete="off">
        </div>

        <!-- Main Text Area -->
        <textarea id="mainText" placeholder="enter text here..."></textarea>

        <!-- Actions -->
        <div class="button-row">
            <button id="decypherBtn">decypher</button>
            <button id="cypherBtn">cypher</button>
        </div>
    </div>

    <script>
        const keywordInput = document.getElementById('keyword');
        const textArea = document.getElementById('mainText');
        const cypherBtn = document.getElementById('cypherBtn');
        const decypherBtn = document.getElementById('decypherBtn');

        // Logic to shift characters within the printable ASCII range (32 to 126)
        // This ensures the mangled text is still "copy-pasteable" characters
        function processText(text, key, encrypt = true) {
            if (!key) return text;
            
            let result = "";
            let keyIndex = 0;

            for (let i = 0; i < text.length; i++) {
                const charCode = text.charCodeAt(i);
                
                // Only shift printable characters (Space through ~)
                if (charCode >= 32 && charCode <= 126) {
                    const keyChar = key.charCodeAt(keyIndex % key.length);
                    const shift = keyChar % 95; // 95 printable characters in range
                    
                    let newCode;
                    if (encrypt) {
                        newCode = ((charCode - 32 + shift) % 95) + 32;
                    } else {
                        newCode = ((charCode - 32 - shift + 95) % 95) + 32;
                    }
                    
                    result += String.fromCharCode(newCode);
                    keyIndex++;
                } else {
                    // Leave emojis, newlines, etc. as they are
                    result += text[i];
                }
            }
            return result;
        }

        cypherBtn.addEventListener('click', () => {
            const key = keywordInput.value;
            const text = textArea.value;
            if (!key) {
                alert("Please enter a keyword first.");
                return;
            }
            textArea.value = processText(text, key, true);
        });

        decypherBtn.addEventListener('click', () => {
            const key = keywordInput.value;
            const text = textArea.value;
            if (!key) {
                alert("Please enter a keyword first.");
                return;
            }
            textArea.value = processText(text, key, false);
        });
    </script>

</body>
</html>
